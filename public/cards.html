<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Card Collection</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.1);
      --accent: #7c6aff;
      --green: #34d399;
      --text: #f0f1f8;
      --sub: #9a9bb8;
      --muted: #5a5b78;
      --rad: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 560px; margin: 0 auto; padding: 1.5rem; }

    /* Welcome (signed out) */
    #view-welcome { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 0; }
    #view-welcome .welcome-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    #view-welcome .welcome-sub { font-size: 1rem; color: var(--sub); margin-bottom: 2rem; }
    .auth-card { width: 100%; max-width: 340px; padding: 1.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad); margin-bottom: 1rem; }
    .auth-card h2 { font-size: 1rem; font-weight: 600; color: var(--sub); margin-bottom: 1rem; }
    .auth-card label { display: block; font-size: 0.85rem; color: var(--sub); margin-bottom: 0.35rem; }
    .auth-card input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; margin-bottom: 0.75rem; }
    .auth-card .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 0.25rem; }
    .auth-card .btn-primary { background: var(--accent); color: #fff; }
    .auth-card .btn-ghost { background: transparent; color: var(--sub); border: 1px solid var(--border); }
    #view-welcome .config-link { font-size: 0.8rem; color: var(--muted); margin-top: 1.5rem; }
    #view-welcome .config-link a { color: var(--accent); text-decoration: none; }
    .firebase-config { margin-top: 1rem; padding: 1rem; background: rgba(124,106,255,.08); border-radius: 10px; font-size: 0.8rem; }
    .firebase-config textarea { width: 100%; min-height: 70px; margin: 8px 0; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: monospace; }
    #view-app { display: none; }
    #view-app.show { display: block; }

    /* App header */
    .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
    .app-header .app-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
    .app-header .user-row { font-size: 0.9rem; color: var(--sub); display: flex; align-items: center; gap: 10px; }
    .app-header .btn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--sub); font-weight: 600; font-size: 0.85rem; cursor: pointer; }
    .app-header .btn:hover { color: var(--text); }

    /* Tabs */
    .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .tab { padding: 10px 18px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--sub); cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .tab.active { background: rgba(124,106,255,.2); border-color: var(--accent); color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Scan panel */
    .scan-hero { text-align: center; padding: 1.5rem 0; }
    .scan-hero .scan-title { font-size: 1.1rem; color: var(--sub); margin-bottom: 1rem; }
    .scan-upload { border: 2px dashed var(--border); border-radius: var(--rad); padding: 2rem; text-align: center; margin-bottom: 1rem; cursor: pointer; transition: background .2s; }
    .scan-upload:hover { background: var(--surface); }
    .scan-upload input[type="file"] { display: none; }
    .scan-upload .upload-label { font-size: 0.95rem; color: var(--sub); cursor: pointer; }
    .scan-upload .upload-label strong { color: var(--accent); }
    .btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .identify-preview { max-width: 100%; max-height: 220px; margin-top: 1rem; border-radius: 10px; object-fit: contain; display: block; }
    #identify-canvas { display: none; }
    .card-detail { margin-top: 1.25rem; padding: 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad); }
    .card-detail .name { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }
    .card-detail .set { font-size: 0.9rem; color: var(--sub); margin-bottom: 1rem; }
    .price-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; margin-bottom: 1rem; }
    .price-table th, .price-table td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    .price-table th { color: var(--sub); font-weight: 600; }
    .price-table td { color: var(--text); }
    .price-table .price-val { color: var(--green); font-weight: 600; }
    .add-to-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
    .add-to-row select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); min-width: 160px; }
    .settings-toggle { font-size: 0.85rem; color: var(--muted); margin-top: 1rem; cursor: pointer; }
    .settings-toggle:hover { color: var(--sub); }
    .api-keys { display: none; margin-top: 1rem; padding: 1rem; background: var(--surface); border-radius: 10px; }
    .api-keys.show { display: block; }
    .api-keys label { display: block; font-size: 0.8rem; color: var(--sub); margin-bottom: 4px; }
    .api-keys input { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 8px; font-size: 0.9rem; }

    /* Collections + graph */
    .graph-wrap { margin-bottom: 1.5rem; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad); }
    .graph-wrap h3 { font-size: 0.95rem; color: var(--sub); margin-bottom: 0.75rem; }
    .graph-wrap canvas { max-height: 220px; width: 100% !important; }
    .new-collection { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .new-collection input { padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); width: 200px; font-size: 1rem; }
    .collections-list { display: grid; gap: 12px; }
    .collection-card { padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad); }
    .collection-card h3 { font-size: 1rem; margin-bottom: 6px; color: var(--text); }
    .collection-card .meta { font-size: 0.85rem; color: var(--sub); margin-bottom: 8px; }
    .collection-card .total { font-size: 1.1rem; font-weight: 700; color: var(--green); margin-top: 8px; }
    .collection-card .items { list-style: none; }
    .collection-card .items li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .collection-card .items li:last-child { border-bottom: none; }
    .collection-card .items .remove-card { padding: 4px 10px; font-size: 0.75rem; background: rgba(255,95,95,.15); color: #f87171; border: none; border-radius: 6px; cursor: pointer; }
    .empty { color: var(--muted); font-size: 0.9rem; padding: 1rem; text-align: center; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: rgba(0,0,0,.9); border-radius: 10px; font-size: 0.9rem; z-index: 100; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="container">
    <!-- Welcome: sign in first -->
    <div id="view-welcome">
      <h1 class="welcome-title">Card Collection</h1>
      <p class="welcome-sub">Sign in to scan cards and track your collection</p>
      <div class="auth-card" id="auth-card-signin">
        <h2>Sign in</h2>
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email"/>
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" class="btn btn-primary" id="auth-signin-btn">Sign in</button>
      </div>
      <div class="auth-card" id="auth-card-signup">
        <h2>New? Sign up</h2>
        <label>Email</label>
        <input type="email" id="auth-signup-email" placeholder="you@example.com" autocomplete="email"/>
        <label>Password (min 6 characters)</label>
        <input type="password" id="auth-signup-password" placeholder="••••••••" autocomplete="new-password"/>
        <button type="button" class="btn btn-ghost" id="auth-signup-btn">Create account</button>
      </div>
      <p class="config-link"><a href="#" id="config-link">Developer: Firebase config</a></p>
      <div class="firebase-config" id="firebase-config-wrap" style="display:none;">
        <textarea id="firebase-config-input" placeholder='Paste Firebase config JSON'></textarea>
        <button type="button" class="btn btn-primary" id="firebase-config-save">Save</button>
      </div>
    </div>

    <!-- App (after sign in) -->
    <div id="view-app">
      <header class="app-header">
        <span class="app-title">Card Collection</span>
        <div class="user-row">
          <span id="auth-user-email"></span>
          <button type="button" class="btn" id="auth-signout-btn">Sign out</button>
        </div>
      </header>
      <div class="tabs">
        <button type="button" class="tab active" data-panel="scan">Scan card</button>
        <button type="button" class="tab" data-panel="collections">My collection</button>
      </div>
      <div id="panel-scan" class="panel active">
        <div class="scan-hero">
          <p class="scan-title">Take or upload a photo of your card</p>
          <div class="scan-upload" id="scan-upload">
            <input type="file" id="identify-file" accept="image/*" capture="environment"/>
            <label class="upload-label" for="identify-file"><strong>Choose photo</strong> or tap to open camera</label>
          </div>
          <img id="identify-preview" class="identify-preview" alt="Preview" style="display:none;"/>
          <button type="button" class="btn btn-primary" id="identify-btn" style="margin-top:1rem;">Recognize card</button>
        </div>
        <canvas id="identify-canvas"></canvas>
        <div id="identify-result" class="card-detail" style="display:none;"></div>
        <p class="settings-toggle" id="settings-toggle">API keys (Pokémon TCG, Roboflow)</p>
        <div class="api-keys" id="api-keys">
          <label>Pokémon TCG API key <input type="password" id="pokemon-tcg-api-key" placeholder="Optional" autocomplete="off"/></label>
          <label>Roboflow API key <input type="password" id="roboflow-api-key" placeholder="Optional" autocomplete="off"/></label>
          <label>Roboflow model <input type="text" id="roboflow-model" placeholder="e.g. workspace/project/1" autocomplete="off"/></label>
        </div>
      </div>
      <div id="panel-collections" class="panel">
        <div class="graph-wrap">
          <h3>Collection value</h3>
          <canvas id="price-chart"></canvas>
        </div>
        <div class="new-collection">
          <input type="text" id="new-collection-name" placeholder="New collection name"/>
          <button type="button" class="btn btn-primary" id="new-collection-btn">Add collection</button>
        </div>
        <div id="collections-list" class="collections-list"></div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
  (function(){
    var GRADES = ['Ungraded', 'PSA 1', 'PSA 2', 'PSA 3', 'PSA 4', 'PSA 5', 'PSA 6', 'PSA 7', 'PSA 8', 'PSA 9', 'PSA 10'];
    var currentUserId = null;
    var currentCollections = [];
    var lastIdentifiedCard = null;
    var priceChartInstance = null;
    var firebaseApp = null;
    var firebaseAuth = null;
    var firebaseDb = null;

    var DEFAULT_FIREBASE_CONFIG = {
      apiKey: "AIzaSyAUGLKpieUGBgu5Rk7uVESHKFOmWKDGDiU",
      authDomain: "pokemon-recognizer-f5bb6.firebaseapp.com",
      projectId: "pokemon-recognizer-f5bb6",
      storageBucket: "pokemon-recognizer-f5bb6.firebasestorage.app",
      messagingSenderId: "419371974681",
      appId: "1:419371974681:web:e60d329fcba87856a92a88",
      measurementId: "G-7TNSTJVH54"
    };
    function getFirebaseConfig() {
      try {
        var raw = localStorage.getItem('firebase_config');
        if (!raw) return DEFAULT_FIREBASE_CONFIG;
        return JSON.parse(raw);
      } catch (e) { return DEFAULT_FIREBASE_CONFIG; }
    }
    function initFirebase() {
      var config = getFirebaseConfig();
      if (!config || !config.apiKey) return false;
      try {
        if (firebaseApp) return true;
        firebaseApp = firebase.initializeApp(config);
        firebaseAuth = firebase.auth();
        firebaseDb = firebase.firestore();
        return true;
      } catch (e) { console.error(e); return false; }
    }

    function loadCollectionsFromFirestore(uid) {
      if (!firebaseDb || !uid) return Promise.resolve([]);
      return firebaseDb.collection('users').doc(uid).get().then(function(snap) {
        return snap.exists && snap.data().collections ? snap.data().collections : [];
      }).catch(function() { return []; });
    }
    function saveCollectionsToFirestore(uid, arr) {
      if (!firebaseDb || !uid) return Promise.resolve();
      return firebaseDb.collection('users').doc(uid).set({ collections: arr }, { merge: true }).catch(function(err) {
        console.error(err);
      });
    }

    // Mock card database: name, set, prices by grade (key = grade string, value = dollars)
    var MOCK_CARDS = [
      { id: '1', name: 'Charizard Holo', set: 'Base Set', prices: { 'Ungraded': 450, 'PSA 9': 2200, 'PSA 10': 8500 }},
      { id: '2', name: 'Pikachu Illustrator', set: 'Promo', prices: { 'Ungraded': 120000, 'PSA 9': 450000, 'PSA 10': 900000 }},
      { id: '3', name: 'Blastoise Holo', set: 'Base Set', prices: { 'Ungraded': 180, 'PSA 9': 850, 'PSA 10': 3200 }},
      { id: '4', name: 'Lugia Holo', set: 'Neo Genesis', prices: { 'Ungraded': 95, 'PSA 8': 280, 'PSA 9': 650, 'PSA 10': 1800 }},
      { id: '5', name: 'Umbreon Holo', set: 'Neo Discovery', prices: { 'Ungraded': 320, 'PSA 9': 1200, 'PSA 10': 4200 }},
      { id: '6', name: 'Rayquaza ex', set: 'Deoxys', prices: { 'Ungraded': 85, 'PSA 9': 220, 'PSA 10': 580 }},
      { id: '7', name: 'Mewtwo GX', set: 'Shining Legends', prices: { 'Ungraded': 25, 'PSA 9': 55, 'PSA 10': 140 }},
      { id: '8', name: 'Zard VMAX', set: 'Champions Path', prices: { 'Ungraded': 180, 'PSA 9': 380, 'PSA 10': 950 }},
    ];

    function getStoredCollections() {
      if (currentUserId) return currentCollections;
      try { return JSON.parse(localStorage.getItem('card_collections') || '[]'); } catch(e) { return []; }
    }
    function setStoredCollections(arr) {
      if (currentUserId) {
        currentCollections = arr;
        saveCollectionsToFirestore(currentUserId, arr);
      } else {
        localStorage.setItem('card_collections', JSON.stringify(arr));
      }
    }

    function priceForGrade(card, grade) {
      var p = card.prices[grade];
      if (p != null) return p;
      var keys = Object.keys(card.prices).filter(function(k){ return k !== 'Ungraded'; }).sort();
      if (grade === 'Ungraded') return card.prices['Ungraded'] != null ? card.prices['Ungraded'] : (card.prices['PSA 9'] ? Math.round(card.prices['PSA 9'] * 0.4) : 0);
      var num = parseInt(grade.replace(/\D/g, ''), 10);
      for (var i = 0; i < keys.length; i++) {
        var g = keys[i];
        var n = parseInt(g.replace(/\D/g, ''), 10);
        if (n >= num) return card.prices[g];
      }
      return keys.length ? card.prices[keys[keys.length - 1]] : 0;
    }

    function searchCards(q) {
      q = (q || '').toLowerCase().trim();
      if (!q) return MOCK_CARDS.slice();
      return MOCK_CARDS.filter(function(c){
        return c.name.toLowerCase().indexOf(q) >= 0 || (c.set && c.set.toLowerCase().indexOf(q) >= 0);
      });
    }

    function toast(msg) {
      var t = document.getElementById('toast');
      if (t) { t.textContent = msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2500); }
    }

    function renderSearchResults(cards) {
      var el = document.getElementById('search-results');
      if (!el) return;
      if (!cards.length) { el.innerHTML = '<p class="empty">No cards found. Try another search.</p>'; return; }
      el.innerHTML = cards.map(function(card){
        var gradeOptions = GRADES.map(function(g){
          var price = priceForGrade(card, g);
          return '<option value="' + g + '" data-price="' + price + '">' + g + ' — $' + price.toLocaleString() + '</option>';
        }).join('');
        var firstGrade = GRADES[0];
        var firstPrice = priceForGrade(card, firstGrade);
        var isUngraded = firstGrade === 'Ungraded';
        return '<div class="card-result" data-card-id="' + card.id + '">' +
          '<div><div class="name">' + (card.name || '') + '</div><div class="set">' + (card.set || '') + '</div></div>' +
          '<div class="prices">' +
          '<div class="grade-row">' +
          '<select class="grade-select" data-card-id="' + card.id + '" data-name="' + (card.name || '').replace(/"/g, '&quot;') + '" data-set="' + (card.set || '').replace(/"/g, '&quot;') + '">' + gradeOptions + '</select>' +
          '<span class="price-tag' + (isUngraded ? ' ungraded' : '') + '" data-grade="' + firstGrade + '">$' + firstPrice.toLocaleString() + '</span>' +
          '</div>' +
          '<button type="button" class="btn btn-ghost btn-sm add-to-collection-btn">Add to collection</button>' +
          '</div></div>';
      }).join('');

      el.querySelectorAll('.grade-select').forEach(function(select){
        var row = select.closest('.card-result');
        var priceTag = row && row.querySelector('.price-tag');
        if (!priceTag) return;
        function updatePrice() {
          var opt = select.options[select.selectedIndex];
          var price = opt ? parseInt(opt.getAttribute('data-price'), 10) : 0;
          var grade = select.value;
          priceTag.textContent = '$' + (price || 0).toLocaleString();
          priceTag.dataset.grade = grade;
          if (grade === 'Ungraded') priceTag.classList.add('ungraded'); else priceTag.classList.remove('ungraded');
        }
        select.addEventListener('change', updatePrice);
      });

      el.querySelectorAll('.add-to-collection-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          var row = btn.closest('.card-result');
          var select = row && row.querySelector('.grade-select');
          if (!select) return;
          var cardId = select.dataset.cardId;
          var name = select.dataset.name || '';
          var set = select.dataset.set || '';
          var grade = select.value;
          var card = MOCK_CARDS.find(function(c){ return c.id === cardId; });
          var price = priceForGrade(card || {}, grade);
          var collections = getStoredCollections();
          if (!collections.length) { toast('Create a collection first (My Collections tab).'); return; }
          var addToSel = document.getElementById('add-to-collection-select');
          var targetId = addToSel && addToSel.value ? addToSel.value : (collections[0] && collections[0].id);
          if (targetId) addCardToCollection(targetId, { cardId: cardId, name: name, set: set, grade: grade, price: price });
        });
      });
    }

    function addCardToCollection(collectionId, item) {
      var collections = getStoredCollections();
      var col = collections.find(function(c){ return c.id === collectionId; });
      if (!col) { toast('Collection not found.'); return; }
      col.items = col.items || [];
      col.items.push({ cardId: item.cardId, name: item.name, set: item.set, grade: item.grade, price: item.price });
      setStoredCollections(collections);
      toast('Added to "' + col.name + '".');
      renderCollections();
    }

    function refreshAddToSelect() {}

    function renderCollections() {
      var el = document.getElementById('collections-list');
      if (!el) return;
      var collections = getStoredCollections();
      refreshAddToSelect();
      renderPriceChart();
      if (!collections.length) { el.innerHTML = '<p class="empty">No collections yet. Create one above.</p>'; return; }
      el.innerHTML = collections.map(function(col){
        var items = col.items || [];
        var total = items.reduce(function(sum, i){ return sum + (i.price || 0); }, 0);
        var list = items.length ? '<ul class="items">' + items.map(function(i, idx){
          return '<li data-collection-id="' + col.id + '" data-item-index="' + idx + '">' +
            '<span>' + (i.name || 'Card') + ' <small>(' + (i.grade || 'Ungraded') + ')</small></span>' +
            '<span>$' + (i.price || 0).toLocaleString() + '</span>' +
            '<button type="button" class="remove-card" aria-label="Remove">Remove</button></li>';
        }).join('') + '</ul>' : '<p class="empty">No cards in this collection. Search cards above, pick a grade, and click Add to collection.</p>';
        return '<div class="collection-card" data-collection-id="' + col.id + '">' +
          '<h3>' + (col.name || 'Unnamed') + '</h3>' +
          '<div class="meta">' + items.length + ' card(s)</div>' +
          list +
          '<div class="total">Total: $' + total.toLocaleString() + '</div>' +
          '</div>';
      }).join('');

      el.querySelectorAll('.remove-card').forEach(function(btn){
        btn.addEventListener('click', function(){
          var li = btn.closest('li');
          if (!li) return;
          var cid = li.dataset.collectionId;
          var idx = parseInt(li.dataset.itemIndex, 10);
          if (cid == null || isNaN(idx)) return;
          var collections = getStoredCollections();
          var col = collections.find(function(c){ return c.id === cid; });
          if (!col || !col.items || !col.items[idx]) return;
          col.items.splice(idx, 1);
          setStoredCollections(collections);
          toast('Card removed.');
          renderCollections();
        });
      });
    }

    document.querySelectorAll('.tab').forEach(function(tab){
      tab.addEventListener('click', function(){
        document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
        document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
        tab.classList.add('active');
        var pid = tab.dataset.panel;
        var panel = document.getElementById('panel-' + pid);
        if (panel) panel.classList.add('active');
        if (pid === 'collections') { renderCollections(); renderPriceChart(); }
      });
    });
    function renderPriceChart() {
      var canvas = document.getElementById('price-chart');
      if (!canvas) return;
      var collections = getStoredCollections();
      var labels = [];
      var values = [];
      collections.forEach(function(col) {
        labels.push(col.name || 'Unnamed');
        var total = (col.items || []).reduce(function(s, i) { return s + (i.price || 0); }, 0);
        values.push(total);
      });
      if (priceChartInstance) priceChartInstance.destroy();
      if (labels.length === 0) {
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }
      priceChartInstance = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{ label: 'Value ($)', data: values, backgroundColor: 'rgba(124,106,255,0.5)', borderColor: 'rgba(124,106,255,0.8)', borderWidth: 1 }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { callback: function(v) { return '$' + v; } } }
          }
        }
      });
    }

    // ——— Identify from photo: better holo detection + hybrid Roboflow / Tesseract ———
    function getIdentifyKeys() {
      try {
        return {
          pokemonTcg: (localStorage.getItem('pokemon_tcg_api_key') || '').trim(),
          roboflow: (localStorage.getItem('roboflow_api_key') || '').trim(),
          roboflowModel: (localStorage.getItem('roboflow_model') || '').trim()
        };
      } catch (e) { return { pokemonTcg: '', roboflow: '', roboflowModel: '' }; }
    }
    function saveIdentifyKeys() {
      var pk = document.getElementById('pokemon-tcg-api-key');
      var rk = document.getElementById('roboflow-api-key');
      var rm = document.getElementById('roboflow-model');
      if (pk) localStorage.setItem('pokemon_tcg_api_key', pk.value.trim());
      if (rk) localStorage.setItem('roboflow_api_key', rk.value.trim());
      if (rm) localStorage.setItem('roboflow_model', rm.value.trim());
    }
    (function loadIdentifyKeysIntoInputs() {
      var k = getIdentifyKeys();
      var pk = document.getElementById('pokemon-tcg-api-key');
      var rk = document.getElementById('roboflow-api-key');
      var rm = document.getElementById('roboflow-model');
      if (pk && k.pokemonTcg) pk.value = k.pokemonTcg;
      if (rk && k.roboflow) rk.value = k.roboflow;
      if (rm && k.roboflowModel) rm.value = k.roboflowModel;
    })();

    function isHoloCard(canvas) {
      var ctx = canvas.getContext('2d');
      var w = canvas.width;
      var h = canvas.height;
      var pixels = ctx.getImageData(0, 0, w, h).data;
      var saturations = [];
      var brightCount = 0;
      var totalLuma = 0;
      var count = 0;
      for (var i = 0; i < pixels.length; i += 4) {
        var r = pixels[i] / 255;
        var g = pixels[i + 1] / 255;
        var b = pixels[i + 2] / 255;
        var max = Math.max(r, g, b);
        var min = Math.min(r, g, b);
        var sat = max === 0 ? 0 : (max - min) / max;
        saturations.push(sat);
        var luma = 0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2];
        totalLuma += luma;
        if (luma > 200) brightCount++;
        count++;
      }
      var avgSat = saturations.reduce(function(a, b) { return a + b; }, 0) / count;
      var variance = saturations.reduce(function(acc, s) { return acc + (s - avgSat) * (s - avgSat); }, 0) / count;
      var brightRatio = brightCount / count;
      var avgLuma = totalLuma / count;
      return (avgSat > 0.32 && variance > 0.04) || (brightRatio > 0.08 && avgSat > 0.25);
    }

    function extractCardName(ocrText) {
      if (!ocrText || !ocrText.trim()) return '';
      var lines = ocrText.split(/\r?\n/).map(function(l) { return l.trim(); }).filter(Boolean);
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.length < 3 || line.length > 80) continue;
        if (/^\d+$/.test(line) || /^[\d\s\/\-]+$/.test(line)) continue;
        if (/^(HP|Ability|Attack|Pokémon|Trainer|Energy)/i.test(line) && line.length < 15) continue;
        return line;
      }
      return lines[0] || '';
    }

    var ROBOFLOW_CONFIDENCE_THRESHOLD = 0.7;

    function runRoboflow(canvas) {
      var keys = getIdentifyKeys();
      if (!keys.roboflow || !keys.roboflowModel) return Promise.resolve({ name: null, confidence: 0 });
      var model = keys.roboflowModel.replace(/^\/+|\/+$/g, '');
      var url = 'https://infer.roboflow.com/' + model + '?api_key=' + encodeURIComponent(keys.roboflow);
      return new Promise(function(resolve) {
        canvas.toBlob(function(blob) {
          if (!blob) { resolve({ name: null, confidence: 0 }); return; }
          var fd = new FormData();
          fd.append('file', blob, 'image.png');
          fetch(url, { method: 'POST', body: fd })
            .then(function(r) { return r.json(); })
            .then(function(data) {
              var preds = data.predictions || [];
              var best = preds.length ? preds.reduce(function(a, b) { return (a.confidence || 0) > (b.confidence || 0) ? a : b; }) : null;
              var name = best && (best.class !== undefined) ? String(best.class) : (best && best.predicted_class ? String(best.predicted_class) : null);
              resolve({ name: name || null, confidence: best ? (best.confidence || 0) : 0 });
            })
            .catch(function() { resolve({ name: null, confidence: 0 }); });
        }, 'image/png');
      });
    }

    function runTesseract(canvas) {
      return (typeof Tesseract !== 'undefined' && Tesseract.recognize)
        ? Tesseract.recognize(canvas, 'eng').then(function(res) { return extractCardName(res.data.text); })
        : Promise.resolve('');
    }

    var PSA_MULTIPLIERS = { 'Ungraded': 1, 'PSA 1': 0.4, 'PSA 2': 0.5, 'PSA 3': 0.55, 'PSA 4': 0.6, 'PSA 5': 0.7, 'PSA 6': 0.8, 'PSA 7': 0.9, 'PSA 8': 1.2, 'PSA 9': 2.5, 'PSA 10': 6 };
    function ensureCardHasAllGrades(card) {
      if (!card || !card.prices) return card;
      var base = card.prices['Ungraded'];
      if (base == null) base = card.prices['PSA 9'] ? card.prices['PSA 9'] / 2.5 : 0;
      var p = {};
      GRADES.forEach(function(g) {
        var mult = PSA_MULTIPLIERS[g];
        if (card.prices[g] != null) p[g] = card.prices[g];
        else if (mult != null) p[g] = Math.round(base * mult * 100) / 100;
        else p[g] = base;
      });
      card.prices = p;
      return card;
    }
    function lookupCard(name, apiKey) {
      if (!name || !name.trim()) return Promise.resolve(null);
      var key = apiKey || getIdentifyKeys().pokemonTcg;
      var url = 'https://api.pokemontcg.io/v2/cards?q=name:"' + encodeURIComponent(name.trim()) + '"&pageSize=5';
      var headers = { 'Content-Type': 'application/json' };
      if (key) headers['X-Api-Key'] = key;
      return fetch(url, { headers: headers }).then(function(r) { return r.json(); }).then(function(data) {
        var cards = data.data || [];
        if (!cards.length) return null;
        var c = cards[0];
        var prices = { 'Ungraded': 0 };
        if (c.tcgplayer && c.tcgplayer.prices) {
          var m = c.tcgplayer.prices.market || c.tcgplayer.prices.mid || c.tcgplayer.prices.low;
          if (m != null) prices['Ungraded'] = Math.round(parseFloat(m) * 100) / 100;
        }
        if (c.cardmarket && c.cardmarket.prices && c.cardmarket.prices.averageSellPrice != null && !prices['Ungraded']) {
          prices['Ungraded'] = Math.round(parseFloat(c.cardmarket.prices.averageSellPrice) * 100) / 100;
        }
        var card = { id: c.id, name: c.name || name, set: (c.set && c.set.name) || '', prices: prices };
        return ensureCardHasAllGrades(card);
      }).catch(function() { return null; });
    }

    function identifyFromCanvas(canvas, done) {
      var keys = getIdentifyKeys();
      var isHolo = isHoloCard(canvas);
      function tryLookup(name) {
        if (!name || !name.trim()) return Promise.resolve(null);
        return lookupCard(name, keys.pokemonTcg);
      }
      function showCard(card) {
        if (!card) return;
        done(card);
      }
      if (isHolo) {
        runRoboflow(canvas).then(function(robo) {
          if (robo.confidence >= ROBOFLOW_CONFIDENCE_THRESHOLD && robo.name) {
            tryLookup(robo.name).then(showCard);
            return;
          }
          runTesseract(canvas).then(function(ocrName) {
            var name = (ocrName && ocrName.trim()) || robo.name;
            if (name) tryLookup(name).then(showCard);
            else showCard(null);
          });
        });
      } else {
        runTesseract(canvas).then(function(ocrName) {
          if (ocrName && ocrName.length >= 2) {
            tryLookup(ocrName).then(function(card) {
              if (card) { showCard(card); return; }
              runRoboflow(canvas).then(function(robo) {
                if (robo.name) tryLookup(robo.name).then(showCard);
                else showCard(null);
              });
            });
            return;
          }
          runRoboflow(canvas).then(function(robo) {
            if (robo.name) tryLookup(robo.name).then(showCard);
            else showCard(null);
          });
        });
      }
    }

    var identifyFile = document.getElementById('identify-file');
    var identifyBtn = document.getElementById('identify-btn');
    var identifyPreview = document.getElementById('identify-preview');
    var identifyCanvas = document.getElementById('identify-canvas');
    var identifyResult = document.getElementById('identify-result');

    if (identifyFile) identifyFile.addEventListener('change', function() {
      var file = (identifyFile.files && identifyFile.files[0]) ? identifyFile.files[0] : null;
      if (!file || !file.type.match(/^image\//)) { identifyPreview.style.display = 'none'; return; }
      var url = URL.createObjectURL(file);
      identifyPreview.src = url;
      identifyPreview.style.display = 'block';
      identifyResult.style.display = 'none';
    });

    ['pokemon-tcg-api-key', 'roboflow-api-key', 'roboflow-model'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('blur', saveIdentifyKeys);
    });

    if (identifyBtn && identifyCanvas && identifyResult) identifyBtn.addEventListener('click', function() {
      saveIdentifyKeys();
      var file = identifyFile && identifyFile.files && identifyFile.files[0] ? identifyFile.files[0] : null;
      if (!file || !file.type.match(/^image\//)) { toast('Choose an image first.'); return; }
      var img = new Image();
      var ctx = identifyCanvas.getContext('2d');
      identifyBtn.disabled = true;
      identifyResult.style.display = 'none';
      identifyResult.textContent = 'Identifying…';
      identifyResult.style.display = 'block';
      img.onload = function() {
        identifyCanvas.width = img.width;
        identifyCanvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        identifyFromCanvas(identifyCanvas, function(card) {
          identifyBtn.disabled = false;
          if (!card) {
            identifyResult.innerHTML = '<p class="empty">Could not identify card. Try better lighting and a clear photo of the card name.</p>';
            identifyResult.style.display = 'block';
            return;
          }
          lastIdentifiedCard = ensureCardHasAllGrades(card);
          var rows = GRADES.map(function(g) {
            var price = priceForGrade(lastIdentifiedCard, g);
            return '<tr><td>' + g + '</td><td class="price-val">$' + (price != null ? price.toLocaleString() : '—') + '</td></tr>';
          }).join('');
          var colSel = '<select id="add-to-collection-select" class="grade-select">' + (getStoredCollections().map(function(c) { return '<option value="' + c.id + '">' + (c.name || 'Unnamed') + '</option>'; }).join('')) + '</select>';
          identifyResult.innerHTML = '<div class="name">' + (lastIdentifiedCard.name || '').replace(/</g, '&lt;') + '</div>' +
            '<div class="set">' + (lastIdentifiedCard.set || '').replace(/</g, '&lt;') + '</div>' +
            '<table class="price-table"><thead><tr><th>Grade</th><th>Price</th></tr></thead><tbody>' + rows + '</tbody></table>' +
            '<div class="add-to-row"><label>Add to collection:</label>' + colSel + '<select id="identify-grade-select">' + GRADES.map(function(g) {
              return '<option value="' + g + '">' + g + '</option>';
            }).join('') + '</select><button type="button" class="btn btn-primary" id="identify-add-btn">Add</button></div>';
          identifyResult.style.display = 'block';
          var addBtn = document.getElementById('identify-add-btn');
          var gradeSel = document.getElementById('identify-grade-select');
          var addColSel = document.getElementById('add-to-collection-select');
          if (addBtn && gradeSel && addColSel) addBtn.addEventListener('click', function() {
            var collections = getStoredCollections();
            if (!collections.length) { toast('Create a collection first (My collection tab).'); return; }
            var cid = addColSel.value;
            var grade = gradeSel.value;
            var price = priceForGrade(lastIdentifiedCard, grade);
            addCardToCollection(cid, { cardId: lastIdentifiedCard.id, name: lastIdentifiedCard.name, set: lastIdentifiedCard.set, grade: grade, price: price });
            toast('Added to collection.');
          });
        });
      };
      img.onerror = function() { identifyBtn.disabled = false; identifyResult.textContent = 'Failed to load image.'; identifyResult.style.display = 'block'; };
      img.src = URL.createObjectURL(file);
    });

    var settingsToggle = document.getElementById('settings-toggle');
    var apiKeysEl = document.getElementById('api-keys');
    if (settingsToggle && apiKeysEl) settingsToggle.addEventListener('click', function() { apiKeysEl.classList.toggle('show'); });

    var newName = document.getElementById('new-collection-name');
    var newBtn = document.getElementById('new-collection-btn');
    if (newBtn) newBtn.addEventListener('click', function(){
      var name = (newName && newName.value) ? newName.value.trim() : '';
      if (!name) { toast('Enter a collection name.'); return; }
      var collections = getStoredCollections();
      var id = 'c' + Date.now();
      collections.push({ id: id, name: name, items: [] });
      setStoredCollections(collections);
      if (newName) newName.value = '';
      toast('Collection "' + name + '" created.');
      document.querySelector('.tab[data-panel="collections"]').click();
      renderCollections();
    });

    function showView(welcome, app) {
      var vw = document.getElementById('view-welcome');
      var va = document.getElementById('view-app');
      if (vw) vw.style.display = welcome ? 'flex' : 'none';
      if (va) { va.style.display = app ? 'block' : 'none'; if (app) va.classList.add('show'); else va.classList.remove('show'); }
    }
    function showSignedIn(user) {
      showView(false, true);
      var emailEl = document.getElementById('auth-user-email');
      if (emailEl) emailEl.textContent = user && user.email ? user.email : '';
    }
    function showSignedOut() {
      showView(true, false);
    }

    var configInput = document.getElementById('firebase-config-input');
    var configSave = document.getElementById('firebase-config-save');
    var configWrap = document.getElementById('firebase-config-wrap');
    var configLink = document.getElementById('config-link');
    if (configLink && configWrap) configLink.addEventListener('click', function(e) { e.preventDefault(); configWrap.style.display = configWrap.style.display === 'none' ? 'block' : 'none'; });
    if (configSave && configInput) {
      var saved = localStorage.getItem('firebase_config');
      var config;
      try { config = saved ? JSON.parse(saved) : DEFAULT_FIREBASE_CONFIG; } catch (e) { config = DEFAULT_FIREBASE_CONFIG; }
      configInput.value = JSON.stringify(config, null, 2);
      configSave.addEventListener('click', function() {
        try {
          var obj = JSON.parse(configInput.value.trim());
          localStorage.setItem('firebase_config', JSON.stringify(obj));
          toast('Config saved. Reload to sign in.');
          if (initFirebase()) firebaseAuth.onAuthStateChanged(authStateHandler);
        } catch (e) { toast('Invalid JSON.'); }
      });
    }

    function authStateHandler(user) {
      if (user) {
        currentUserId = user.uid;
        loadCollectionsFromFirestore(user.uid).then(function(arr) {
          currentCollections = Array.isArray(arr) ? arr : [];
          renderCollections();
          refreshAddToSelect();
        });
        showSignedIn(user);
      } else {
        currentUserId = null;
        currentCollections = [];
        showSignedOut();
      }
    }

    if (initFirebase()) {
      firebaseAuth.onAuthStateChanged(authStateHandler);
    } else {
      showView(true, false);
    }

    var signinBtn = document.getElementById('auth-signin-btn');
    var signupBtn = document.getElementById('auth-signup-btn');
    var signoutBtn = document.getElementById('auth-signout-btn');
    if (signinBtn) signinBtn.addEventListener('click', function() {
      var email = (document.getElementById('auth-email') && document.getElementById('auth-email').value) || '';
      var pass = (document.getElementById('auth-password') && document.getElementById('auth-password').value) || '';
      if (!email || !pass) { toast('Enter email and password.'); return; }
      signinBtn.disabled = true;
      firebaseAuth.signInWithEmailAndPassword(email, pass).then(function() { toast('Signed in.'); }).catch(function(err) { toast(err.message || 'Sign in failed.'); }).finally(function() { signinBtn.disabled = false; });
    });
    if (signupBtn) signupBtn.addEventListener('click', function() {
      var email = (document.getElementById('auth-signup-email') && document.getElementById('auth-signup-email').value) || '';
      var pass = (document.getElementById('auth-signup-password') && document.getElementById('auth-signup-password').value) || '';
      if (!email || !pass) { toast('Enter email and password.'); return; }
      if (pass.length < 6) { toast('Password must be at least 6 characters.'); return; }
      signupBtn.disabled = true;
      firebaseAuth.createUserWithEmailAndPassword(email, pass).then(function() { toast('Account created. Signed in.'); }).catch(function(err) { toast(err.message || 'Sign up failed.'); }).finally(function() { signupBtn.disabled = false; });
    });
    if (signoutBtn) signoutBtn.addEventListener('click', function() {
      firebaseAuth.signOut().then(function() { toast('Signed out.'); });
    });
  })();
  </script>
